#This line works when using env in your render to store db connection


services:
  - type: web
    name: MITCRMS
    env: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    autoDeploy: true

    envVars:
      - key: ConnectionStrings__MitcrmsContext
        fromDatabase:
          name: MITCRMS-db
          property: connectionString

databases:
  - name: MITCRMS-db
    databaseName: mitcrms_db
    user: mitcrms_db_user
    plan: free
    region: oregon

